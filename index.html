<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flurolab VR - Laboratorio Allura</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e17; color: #fff; overflow: hidden; }
        #panorama { width: 100vw; height: 100vh; }

        .info-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 23, 0.95);
            border: 1px solid #00d4ff;
            border-radius: 12px;
            padding: 20px 28px;
            max-width: 520px;
            width: 90%;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        .info-overlay.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .info-overlay h3 { color: #00d4ff; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .info-overlay p { color: #b0c4de; font-size: 0.9rem; line-height: 1.6; }
        .info-overlay .close-btn {
            position: absolute; top: 10px; right: 14px;
            background: none; border: none; color: #ff6b6b; font-size: 1.4rem; cursor: pointer;
        }
        .info-overlay .tag {
            display: inline-block; background: #00d4ff22; color: #00d4ff;
            padding: 3px 12px; border-radius: 20px; font-size: 0.75rem; margin-top: 10px; margin-right: 5px;
        }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10, 14, 23, 0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a2332;
        }
        .top-bar .logo { font-weight: 700; color: #00d4ff; font-size: 1.1rem; }
        .top-bar .scene-name { color: #8899aa; font-size: 0.85rem; }
        .top-bar .progress { display: flex; gap: 6px; }
        .top-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #334455; transition: 0.3s; }
        .top-bar .dot.active { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; }

        .nav-controls {
            position: fixed; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 8px; z-index: 1000;
        }
        .nav-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(10, 14, 23, 0.9); border: 1px solid #334455;
            color: #fff; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .nav-btn:hover { border-color: #00d4ff; color: #00d4ff; }

        .scene-map {
            position: fixed; top: 60px; left: 20px;
            background: rgba(10, 14, 23, 0.9); backdrop-filter: blur(10px);
            border: 1px solid #1a2332; border-radius: 10px;
            padding: 12px; z-index: 1000; min-width: 220px;
        }
        .scene-map h4 { color: #00d4ff; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .scene-item {
            padding: 6px 10px; border-radius: 6px; font-size: 0.8rem;
            cursor: pointer; transition: 0.2s; color: #8899aa;
            display: flex; align-items: center; gap: 8px;
        }
        .scene-item:hover { background: #1a2332; color: #fff; }
        .scene-item.active { background: #00d4ff22; color: #00d4ff; }
        .scene-item .num { width: 18px; height: 18px; border-radius: 50%; background: #334455; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
        .scene-item.active .num { background: #00d4ff; color: #0a0e17; }

        .home-btn {
            position: fixed; top: 60px; right: 20px; z-index: 1000;
            background: rgba(10, 14, 23, 0.9); border: 1px solid #334455;
            color: #fff; padding: 8px 16px; border-radius: 8px;
            font-size: 0.8rem; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
            transition: 0.2s;
        }
        .home-btn:hover { border-color: #00d4ff; color: #00d4ff; }

        .custom-hotspot {
            width: 36px; height: 36px;
            background: rgba(0, 212, 255, 0.9);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #0a0e17;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            transition: 0.2s;
            animation: pulse 2s infinite;
        }
        .custom-hotspot:hover { transform: scale(1.2); box-shadow: 0 0 25px rgba(0, 212, 255, 0.8); animation: none; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }
            50% { box-shadow: 0 0 25px rgba(0, 212, 255, 0.8); }
        }

        .nav-arrow-hotspot {
            width: 50px; height: 50px;
            background: rgba(0, 212, 255, 0.7);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            transition: 0.2s;
        }
        .nav-arrow-hotspot:hover { transform: scale(1.15); background: rgba(0, 212, 255, 0.9); }

        .pnlm-container { background: #0a0e17 !important; }

        @media (max-width: 600px) {
            .scene-map { display: none; }
            .info-overlay { max-width: 95%; padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🔷 Laboratorio Allura</div>
        <div class="scene-name" id="sceneName">Entrada</div>
        <div class="progress" id="progressDots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <a href="../" class="home-btn">← Menú Principal</a>

    <div class="scene-map">
        <h4>Navegación</h4>
        <div class="scene-item active" onclick="loadScene(0)">
            <span class="num">1</span> Entrada
        </div>
        <div class="scene-item" onclick="loadScene(1)">
            <span class="num">2</span> Mesa + Allura
        </div>
        <div class="scene-item" onclick="loadScene(2)">
            <span class="num">3</span> Sala de Comando
        </div>
        <div class="scene-item" onclick="loadScene(3)">
            <span class="num">4</span> Cuarto Técnico + Protección
        </div>
    </div>

    <div id="panorama"></div>

    <div class="info-overlay" id="infoOverlay">
        <button class="close-btn" onclick="closeInfo()">×</button>
        <h3 id="infoTitle">🔍 Título</h3>
        <p id="infoText">Contenido...</p>
        <div id="infoTags"></div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" onclick="prevScene()" title="Anterior">←</button>
        <button class="nav-btn" onclick="nextScene()" title="Siguiente">→</button>
        <button class="nav-btn" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script>
        const scenes = [
            {
                name: "Entrada - Laboratorio Allura",
                panorama: "images/01_entrada.jpg",
                yaw: 0,
                pitch: 0,
                hfov: 100,
                hotspots: [
                    {
                        yaw: -85, pitch: -5,
                        title: "🚪 Checklist de Ingreso",
                        text: "Antes de entrar: verificar identidad del paciente, consentimiento informado, estudios previos, alergias a contraste, función renal (creatinina). Lavado de manos 3 minutos. Ropa quirúrgica sobre el plomo.",
                        tags: ["Seguridad", "Checklist", "Obligatorio"]
                    },
                    {
                        yaw: -40, pitch: -8,
                        title: "🛡️ Protocolo de Asepsia",
                        text: "Mandil de plomo (0.5mm), gafas de plomo, dosímetro en cuello, protector tiroideo. Verificar blindaje móvil funcional. No cruzar área estéril.",
                        tags: ["ALARA", "Protección", "Obligatorio"]
                    },
                    {
                        yaw: 45, pitch: -10,
                        title: "🧰 Gabinete de Materiales",
                        text: "Catéteres (6F, 7F), guías (0.035\"), introductores, jeringas, solución salina, contraste no iónico. Verificar fechas de vencimiento antes de cada procedimiento.",
                        tags: ["Materiales", "Inventario", "Seguridad"]
                    },
                    {
                        yaw: 5, pitch: -15,
                        title: "🏥 Vista General de Sala",
                        text: "Sala equipada con Allura Philips de piso. Distribución: anestesia y torres (izquierda), mesa angiográfica + Allura (centro-fondo), gabinete materiales + puerta comando (derecha).",
                        tags: ["Orientación", "Layout"]
                    },
                    {
                        yaw: 0, pitch: -20,
                        type: "nav",
                        title: "→ Avanzar a Mesa + Allura",
                        text: "Navegar a la siguiente posición",
                        targetScene: 1,
                        cssClass: "nav-arrow-hotspot"
                    }
                ]
            },
            {
                name: "Mesa Angiográfica + Allura Philips",
                panorama: "images/02_mesa.jpg",
                yaw: 0,
                pitch: -5,
                hfov: 100,
                hotspots: [
                    {
                        yaw: -10, pitch: -12,
                        title: "⚡ Allura Philips - Posición AP",
                        text: "Angiografo de piso en posición AP (0°) regular. Proyecciones disponibles: AP, LAO (20°-90°), RAO (20°-90°), Cranial (10°-45°), Caudal (10°-45°). Distancia foco-piel: 100cm.",
                        tags: ["Allura", "Proyecciones", "Posición"]
                    },
                    {
                        yaw: 0, pitch: -18,
                        title: "🛏️ Mesa Angiográfica",
                        text: "Mesa con paciente posicionado. Blindaje móvil a 90cm del isocentro. Posición del tecnólogo: a 90° del haz primario, distancia > 1m del tubo. Manos fuera del campo directo.",
                        tags: ["ALARA", "Distancia", "Blindaje"]
                    },
                    {
                        yaw: -5, pitch: -25,
                        title: "🎬 Pedales de Control",
                        text: "Pedal izquierdo: fluoroscopia pulsada (baja dosis). Pedal derecho: grabación cine (15 fps). Pedal central: inyección de contraste (si conectado). NUNCA pisar ambos pedales simultáneamente.",
                        tags: ["Pedales", "Fluoroscopia", "Cine"]
                    },
                    {
                        yaw: 15, pitch: -8,
                        title: "📺 Monitores Colgantes (4)",
                        text: "Arriba izquierda: Adquisición (imagen en tiempo real). Arriba derecha: Referencia (estudios previos). Abajo izquierda: Polígrafo (ECG, presión). Abajo derecha: Imagen input (fluoroscopia continua).",
                        tags: ["Monitores", "Adquisición", "Polígrafo"]
                    },
                    {
                        yaw: -60, pitch: -5,
                        title: "💨 Torre de Anestesia",
                        text: "Conexiones de gases medicinales (oxígeno, aire, vacío). Monitor multiparamétrico: ECG, SpO2, presión arterial, capnografía. Verificar alarmas activas antes de iniciar.",
                        tags: ["Anestesia", "Gases", "Monitor"]
                    },
                    {
                        yaw: 30, pitch: -8,
                        type: "nav",
                        title: "→ Sala de Comando",
                        text: "Navegar a sala de comando",
                        targetScene: 2,
                        cssClass: "nav-arrow-hotspot"
                    },
                    {
                        yaw: -30, pitch: -8,
                        type: "nav",
                        title: "← Volver a Entrada",
                        text: "Regresar a entrada",
                        targetScene: 0,
                        cssClass: "nav-arrow-hotspot"
                    }
                ]
            },
            {
                name: "Sala de Comando",
                panorama: "images/03_comando.jpg",
                yaw: 0,
                pitch: 0,
                hfov: 100,
                hotspots: [
                    {
                        yaw: 0, pitch: -5,
                        title: "🪟 Ventana de Control",
                        text: "Vista directa a Sala. Desde aquí el tecnólogo controla el estudio sin exposición a radiación. Comunicación bidireccional con médico y enfermería de sala.",
                        tags: ["Control", "Protección", "Comunicación"]
                    },
                    {
                        yaw: -25, pitch: -8,
                        title: "📊 Monitores de Adquisición (2)",
                        text: "Monitor izquierdo: imagen en tiempo real, parámetros técnicos (kV, mA, DAP). Monitor derecho: fluoroscopia continua, guía de catéter. Control de calidad de imagen en vivo.",
                        tags: ["Adquisición", "Técnica", "Dosis"]
                    },
                    {
                        yaw: 10, pitch: -8,
                        title: "🔧 Monitor de Postproceso",
                        text: "Medición cuantitativa: stenosis, regurgitación, fracción de eyección. Análisis de cuantificación coronaria (QCA). Generación de reporte estructurado para PACS.",
                        tags: ["Postproceso", "Medición", "Reporte"]
                    },
                    {
                        yaw: 35, pitch: -8,
                        title: "💓 Monitores Catéter/Polígrafo (2)",
                        text: "Polígrafo cardíaco: 12 derivaciones ECG, presión intracavitarias, gradientes transvalvulares. Seguimiento de catéter: posición, presiones, saturaciones.",
                        tags: ["Polígrafo", "Hemodinámia", "Catéter"]
                    },
                    {
                        yaw: -70, pitch: -5,
                        title: "📿 Dosímetros Personales",
                        text: "Control de dosis acumulada por personal. Verificar lectura antes y después del turno. Límite anual: 20 mSv (cuerpo entero). Si excede: notificar jefe de protección radiológica.",
                        tags: ["Dosimetría", "ALARA", "Legal"]
                    },
                    {
                        yaw: -15, pitch: -8,
                        title: "🎮 Panel de Control Remoto",
                        text: "Control remoto del Allura: ángulos del arco, mesa (subir/bajar, trendelemburg), collimador, magnificación, grabación cine/fluoroscopia. Acceso a protocolos predefinidos.",
                        tags: ["Control", "Allura", "Protocolos"]
                    },
                    {
                        yaw: 30, pitch: -8,
                        type: "nav",
                        title: "→ Cuarto Técnico + Protección",
                        text: "Navegar a cuarto técnico",
                        targetScene: 3,
                        cssClass: "nav-arrow-hotspot"
                    },
                    {
                        yaw: -40, pitch: -8,
                        type: "nav",
                        title: "← Volver a Mesa + Allura",
                        text: "Regresar a sala",
                        targetScene: 1,
                        cssClass: "nav-arrow-hotspot"
                    }
                ]
            },
            {
                name: "Cuarto Técnico + Protección Radiológica",
                panorama: "images/04_proteccion.jpg",
                yaw: 0,
                pitch: 0,
                hfov: 100,
                hotspots: [
                    {
                        yaw: -30, pitch: -5,
                        title: "☢️ Zona Controlada - Radiación",
                        text: "Señalización obligatoria: PELIGRO DE RADIACIÓN. Acceso restringido a personal autorizado y capacitado. Cumplimiento de normativa IRAM-ISO 361 y CNEA.",
                        tags: ["Normativa", "Seguridad", "Obligatorio"]
                    },
                    {
                        yaw: 45, pitch: -8,
                        title: "🦺 Mandiles de Plomo",
                        text: "Mandiles de plomo 0.5mm Pb equivalente. Verificar integridad: no grietas, desgastes, roturas. Tallas S, M, L, XL disponibles. Colgar después de uso. No doblar.",
                        tags: ["ALARA", "Protección", "Mantenimiento"]
                    },
                    {
                        yaw: 70, pitch: -5,
                        title: "👓 Gafas y Collarines",
                        text: "Gafas de plomo con lateral completo (0.5mm). Collarines tiroideos (0.5mm). Uso obligatorio durante fluoroscopia. Verificar que no estén rayadas ni opacas.",
                        tags: ["ALARA", "Obligatorio", "Protección"]
                    },
                    {
                        yaw: -60, pitch: -8,
                        title: "⚡ Gabinetes Técnicos Allura",
                        text: "Generador de alta tensión (100-150 kV), refrigeración líquida, módulos de potencia, conexiones de red y UPS. Mantenimiento preventivo cada 6 meses. NO manipular sin autorización.",
                        tags: ["Técnico", "Allura", "Mantenimiento"]
                    },
                    {
                        yaw: -10, pitch: -10,
                        title: "🔧 Equipo de Soporte",
                        text: "Ecógrafo portátil para guía vascular, monitores de mantenimiento, herramientas de calibración. Uso exclusivo por personal de ingeniería biomédica.",
                        tags: ["Soporte", "Biomédica", "Calibración"]
                    },
                    {
                        yaw: -80, pitch: -8,
                        type: "nav",
                        title: "← Volver a Sala de Comando",
                        text: "Regresar a sala de comando",
                        targetScene: 2,
                        cssClass: "nav-arrow-hotspot"
                    }
                ]
            }
        ];

        let currentScene = 0;
        let viewer;

        function initViewer() {
            viewer = pannellum.viewer('panorama', {
                default: {
                    firstScene: "scene0",
                    sceneFadeDuration: 1000,
                    autoLoad: true
                },
                scenes: {}
            });

            scenes.forEach((scene, index) => {
                const hotspots = scene.hotspots.map(h => {
                    if (h.type === "nav") {
                        return {
                            type: "custom",
                            pitch: h.pitch,
                            yaw: h.yaw,
                            cssClass: h.cssClass || "nav-arrow-hotspot",
                            createTooltipFunc: hotspotTooltip,
                            createTooltipArgs: { title: h.title, text: h.text },
                            clickHandlerFunc: navigateToScene,
                            clickHandlerArgs: { sceneIndex: h.targetScene }
                        };
                    }
                    return {
                        type: "custom",
                        pitch: h.pitch,
                        yaw: h.yaw,
                        cssClass: "custom-hotspot",
                        createTooltipFunc: hotspotTooltip,
                        createTooltipArgs: { title: h.title, text: h.text, tags: h.tags },
                        clickHandlerFunc: showInfo,
                        clickHandlerArgs: { title: h.title, text: h.text, tags: h.tags }
                    };
                });

                viewer.addScene("scene" + index, {
                    title: scene.name,
                    panorama: scene.panorama,
                    yaw: scene.yaw,
                    pitch: scene.pitch,
                    hfov: scene.hfov,
                    hotSpots: hotspots
                });
            });

            updateUI();
        }

        function hotspotTooltip(hotSpotDiv, args) {
            hotSpotDiv.classList.add('custom-hotspot');
            hotSpotDiv.innerHTML = args.title.startsWith('→') || args.title.startsWith('←') ? args.title.charAt(0) : '?';
            hotSpotDiv.setAttribute('title', args.title);
        }

        function showInfo(hotSpot, args) {
            document.getElementById('infoTitle').innerHTML = args.title;
            document.getElementById('infoText').textContent = args.text;

            const tagsDiv = document.getElementById('infoTags');
            tagsDiv.innerHTML = '';
            if (args.tags) {
                args.tags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = tag;
                    tagsDiv.appendChild(span);
                });
            }

            document.getElementById('infoOverlay').classList.add('active');
        }

        function navigateToScene(hotSpot, args) {
            loadScene(args.sceneIndex);
        }

        function closeInfo() {
            document.getElementById('infoOverlay').classList.remove('active');
        }

        function loadScene(index) {
            if (index < 0 || index >= scenes.length) return;
            currentScene = index;
            viewer.loadScene("scene" + index);
            updateUI();
        }

        function nextScene() {
            loadScene((currentScene + 1) % scenes.length);
        }

        function prevScene() {
            loadScene((currentScene - 1 + scenes.length) % scenes.length);
        }

        function updateUI() {
            document.getElementById('sceneName').textContent = scenes[currentScene].name;

            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentScene);
            });

            document.querySelectorAll('.scene-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentScene);
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeInfo();
            if (e.key === 'ArrowRight') nextScene();
            if (e.key === 'ArrowLeft') prevScene();
        });

        initViewer();
    </script>
</body>
</html>
